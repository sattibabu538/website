<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Structures — Quick Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E7EAEF;--surface:#FFFFFF;--surface-2:#F2F4F8;
    --ink:#14161F;--muted:#646B7A;--line:#D2D7E0;
    --teal:#0F7A6E;--teal-soft:#D7EAE7;
    --amber:#D9881F;--amber-soft:#F6E7CC;
    --coral:#DC5746;--coral-soft:#F7DCD7;--node:#1C2030;
    --display:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --radius:16px;--shadow:0 1px 2px rgba(20,22,31,.06),0 14px 40px rgba(20,22,31,.10);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:
      radial-gradient(circle at 1px 1px,#dadfe7 1px,transparent 0) 0 0/26px 26px,var(--bg);
    color:var(--ink);font-family:var(--body);line-height:1.6;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 18px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{font-family:var(--display);margin:0;line-height:1.1}
  .mono{font-family:var(--mono)}

  .card{
    width:100%;max-width:600px;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;
  }

  /* header / progress */
  .top{padding:24px 28px 0}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);display:flex;justify-content:space-between;align-items:center}
  .eyebrow .score{color:var(--muted)}
  .bar{height:5px;background:var(--surface-2);border-radius:99px;margin-top:14px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--teal);border-radius:99px;transition:width .4s ease}

  /* question */
  .body{padding:26px 28px 30px}
  .qtag{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .q{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .q code{font-family:var(--mono);font-size:.82em;background:var(--surface-2);border:1px solid var(--line);padding:1px 6px;border-radius:6px}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .opt{
    display:flex;align-items:center;gap:13px;text-align:left;width:100%;
    font-family:var(--body);font-size:15.5px;color:var(--ink);cursor:pointer;
    background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;
    transition:border-color .15s,background .15s,transform .08s;
  }
  .opt:hover:not(:disabled){border-color:var(--node);background:var(--surface-2)}
  .opt:active:not(:disabled){transform:translateY(1px)}
  .opt:disabled{cursor:default}
  .key{
    flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line);
    display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);transition:.15s;
  }
  .opt.correct{border-color:var(--teal);background:var(--teal-soft)}
  .opt.correct .key{background:var(--teal);border-color:var(--teal);color:#fff}
  .opt.wrong{border-color:var(--coral);background:var(--coral-soft)}
  .opt.wrong .key{background:var(--coral);border-color:var(--coral);color:#fff}
  .opt .mark{margin-left:auto;font-family:var(--mono);font-weight:700;font-size:13px;opacity:0}
  .opt.correct .mark{opacity:1;color:var(--teal)}
  .opt.wrong .mark{opacity:1;color:var(--coral)}

  .explain{
    margin-top:18px;border-left:3px solid var(--teal);background:var(--surface-2);
    border-radius:0 10px 10px 0;padding:14px 16px;font-size:14.5px;color:var(--ink);
    display:none;animation:fade .3s ease;
  }
  .explain.show{display:block}
  .explain b{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:5px}

  .foot{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-top:24px;min-height:44px}
  .hint{margin-right:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  button.next{
    font-family:var(--mono);font-size:14px;font-weight:500;cursor:pointer;color:#fff;
    background:var(--node);border:1px solid var(--node);padding:12px 22px;border-radius:11px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .08s;
  }
  button.next.show{opacity:1;pointer-events:auto}
  button.next:active{transform:translateY(1px)}

  /* results */
  .result{padding:46px 30px 40px;text-align:center;display:none;animation:fade .4s ease}
  .result.show{display:block}
  .ring{position:relative;width:150px;height:150px;margin:0 auto 8px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:40px}
  .ring .num small{display:block;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.05em;margin-top:2px}
  .result h2{font-size:26px;margin-top:14px}
  .result .blurb{color:var(--muted);max-width:42ch;margin:10px auto 0}
  .recap{text-align:left;margin:26px auto 0;display:flex;flex-direction:column;gap:8px}
  .ritem{display:flex;gap:11px;align-items:flex-start;font-size:14px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
  .ritem .dot{flex-shrink:0;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;margin-top:1px}
  .ritem.ok .dot{background:var(--teal)}
  .ritem.no .dot{background:var(--coral)}
  .ritem .qt{color:var(--muted);font-size:12.5px;margin-top:3px}
  button.restart{
    margin-top:28px;font-family:var(--mono);font-size:14px;cursor:pointer;
    background:var(--teal);color:#fff;border:1px solid var(--teal);padding:12px 26px;border-radius:11px;
  }
  button.restart:active{transform:translateY(1px)}

  :focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:520px){.q{font-size:19px}.body{padding:22px 20px 26px}.top{padding:20px 20px 0}}
</style>
</head>
<body>

<main class="card">
  <!-- quiz view -->
  <div id="quiz">
    <div class="top">
      <div class="eyebrow"><span>Data structures · quiz</span><span class="score" id="scoreLbl">0 correct</span></div>
      <div class="bar"><i id="bar"></i></div>
    </div>
    <div class="body">
      <div class="qtag" id="qtag">Question 1 of 5</div>
      <h1 class="q" id="qtext">…</h1>
      <div class="opts" id="opts"></div>
      <div class="explain" id="explain"><b id="exlabel">Why</b><span id="extext"></span></div>
      <div class="foot">
        <span class="hint" id="hint">Pick an answer — or press 1–4</span>
        <button class="next" id="next">Next →</button>
      </div>
    </div>
  </div>

  <!-- results view -->
  <div class="result" id="result">
    <div class="ring">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r="64" fill="none" stroke="var(--surface-2)" stroke-width="11"/>
        <circle id="ringFill" cx="75" cy="75" r="64" fill="none" stroke="var(--teal)" stroke-width="11"
                stroke-linecap="round" stroke-dasharray="402" stroke-dashoffset="402"/>
      </svg>
      <div class="num"><span id="finalScore">0</span><small>OUT OF 5</small></div>
    </div>
    <h2 id="verdict">Done</h2>
    <p class="blurb" id="blurb"></p>
    <div class="recap" id="recap"></div>
    <button class="restart" id="restart">Try again</button>
  </div>
</main>

<script>
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const QUESTIONS = [
  {
    q: 'An array holds 1,000 numbers. Reading the element at index 500 costs:',
    opts: [
      'O(1) — one step, no matter the size',
      'O(n) — it scans from the start',
      'O(log n) — it halves each step',
      'O(n²) — it compares every pair'
    ],
    answer: 0,
    why: 'Array elements sit in one contiguous block, so the position is found by arithmetic (start + index × size). Size never affects the cost.'
  },
  {
    q: 'In a linked list, reaching the 5th node requires you to:',
    opts: [
      'Jump straight to it using its index',
      'Start at the head and follow pointers node by node',
      'Hash the position to find its address',
      'Binary-search from the middle'
    ],
    answer: 1,
    why: 'Nodes are scattered in memory and only know their next neighbour, so there is no index math — you walk from the head, making position access O(n).'
  },
  {
    q: 'A structure where the last item added is the first one removed is a:',
    opts: ['Queue', 'Hash table', 'Stack', 'Binary search tree'],
    answer: 2,
    why: 'That is LIFO — last in, first out. A stack only exposes its top via push and pop. It is how programs track nested function calls and undo history.'
  },
  {
    q: 'In a hash table, a "collision" means:',
    opts: [
      'The table has run out of memory',
      'A key was inserted twice',
      'Two different keys hash to the same bucket',
      'The hash function returned a negative number'
    ],
    answer: 2,
    why: 'A hash function maps many possible keys onto a few buckets, so different keys can land in the same one. Tables handle it by chaining entries in that bucket.'
  },
  {
    q: 'Searching a balanced binary search tree is O(log n) because each comparison:',
    opts: [
      'Doubles the nodes left to check',
      'Discards about half of the remaining nodes',
      'Visits every node once',
      'Re-sorts the whole tree'
    ],
    answer: 1,
    why: 'Smaller values go left, larger go right. One comparison tells you which half to ignore, so the search space halves each step — the dictionary-flip idea.'
  }
];

const KEYS = ['A','B','C','D'];
let idx = 0, score = 0, answered = false;
const results = [];

const el = id => document.getElementById(id);
const optsBox = el('opts'), explain = el('explain'), nextBtn = el('next');

function render(){
  const item = QUESTIONS[idx];
  answered = false;
  el('qtag').textContent = `Question ${idx+1} of ${QUESTIONS.length}`;
  el('qtext').innerHTML = item.q;
  el('bar').style.width = (idx/QUESTIONS.length*100) + '%';
  el('scoreLbl').textContent = `${score} correct`;
  explain.classList.remove('show');
  nextBtn.classList.remove('show');
  nextBtn.textContent = idx === QUESTIONS.length-1 ? 'See results →' : 'Next →';
  el('hint').textContent = 'Pick an answer — or press 1–4';
  optsBox.innerHTML = '';
  item.opts.forEach((text,i)=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="key">${KEYS[i]}</span><span>${text}</span><span class="mark"></span>`;
    b.onclick = ()=>choose(i);
    optsBox.appendChild(b);
  });
}

function choose(i){
  if(answered) return;
  answered = true;
  const item = QUESTIONS[idx];
  const buttons = [...optsBox.children];
  const correct = item.answer;
  results.push({q:item.q, picked:i, correct, ok:i===correct});
  if(i===correct) score++;

  buttons.forEach((b,j)=>{
    b.disabled = true;
    if(j===correct){b.classList.add('correct');b.querySelector('.mark').textContent='correct';}
    else if(j===i){b.classList.add('wrong');b.querySelector('.mark').textContent='your pick';}
  });

  el('exlabel').textContent = i===correct ? 'Right' : 'Not quite';
  el('extext').textContent = item.why;
  explain.classList.add('show');
  el('scoreLbl').textContent = `${score} correct`;
  el('hint').textContent = '';
  nextBtn.classList.add('show');
  nextBtn.focus();
}

nextBtn.onclick = ()=>{
  if(idx < QUESTIONS.length-1){ idx++; render(); }
  else finish();
};

function finish(){
  el('quiz').style.display = 'none';
  const res = el('result');
  res.classList.add('show');
  el('bar').style.width = '100%';
  el('finalScore').textContent = score;

  const pct = score/QUESTIONS.length;
  const fill = el('ringFill');
  const C = 402;
  setTimeout(()=>{ fill.style.transition = reduce?'none':'stroke-dashoffset 1s ease'; fill.style.strokeDashoffset = C*(1-pct); }, 60);
  if(pct < .5) fill.setAttribute('stroke','var(--coral)');
  else if(pct < .8) fill.setAttribute('stroke','var(--amber)');

  const verdicts = score===5 ? ['Flawless.','Every trade-off clicked. You could teach this section.']
    : score>=4 ? ['Strong grip.','You have got the core ideas — one slip away from perfect.']
    : score>=3 ? ['Solid start.','The big picture is there. Revisit the misses below to lock it in.']
    : score>=2 ? ['Getting there.','A few held; the rest are worth a second pass through the primer.']
    : ['Fresh start.','No worries — the explanations below are the fastest way back in.'];
  el('verdict').textContent = verdicts[0];
  el('blurb').textContent = verdicts[1];

  const recap = el('recap');
  recap.innerHTML = '';
  results.forEach((r,n)=>{
    const row = document.createElement('div');
    row.className = 'ritem ' + (r.ok?'ok':'no');
    row.innerHTML = `<span class="dot">${r.ok?'✓':'✕'}</span><div><div>Q${n+1}. ${QUESTIONS[n].q}</div>`+
      `<div class="qt">Answer: ${KEYS[r.correct]}) ${QUESTIONS[n].opts[r.correct]}</div></div>`;
    recap.appendChild(row);
  });
}

el('restart').onclick = ()=>{
  idx=0; score=0; results.length=0;
  el('result').classList.remove('show');
  el('ringFill').style.strokeDashoffset = '402';
  el('ringFill').setAttribute('stroke','var(--teal)');
  el('quiz').style.display = 'block';
  render();
};

document.addEventListener('keydown', e=>{
  if(el('result').classList.contains('show')) return;
  if(!answered && ['1','2','3','4'].includes(e.key)){
    const i = +e.key-1;
    if(i < QUESTIONS[idx].opts.length) choose(i);
  } else if(answered && (e.key==='Enter'||e.key===' ')){
    e.preventDefault(); nextBtn.click();
  }
});

render();
</script>
</body>
</html>
